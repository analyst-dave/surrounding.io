<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>surrounding.io | Gravity Release v14.4</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #010409; --text-main: #f0f6fc; --neon-accent: #38bdf8; 
            /* Ultra-Glass Transparency */
            --glass-fill: rgba(15, 23, 42, 0.15); --border-line: rgba(255, 255, 255, 0.15); 
            --red-singles: #f43f5e;
        }
        body.light-theme {
            /* Extremely light sand/stone color */
            --bg-deep: #f5f2eb; --text-main: #0f172a; --neon-accent: #0ea5e9; 
            --glass-fill: rgba(255, 255, 255, 0.25); --border-line: rgba(0, 0, 0, 0.15);
        }
        body { margin: 0; background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; overflow: hidden; transition: background 0.4s; }
        
        canvas#edges { position: absolute; z-index: 1; pointer-events: none; top: 0; left: 0; }
        svg#viz { position: absolute; z-index: 2; width: 100vw; height: 100vh; cursor: grab; top: 0; left: 0; }
        svg#viz:active { cursor: grabbing; }

        /* Glass UI Cards */
        .glass-card { 
            position: fixed; z-index: 500; background: var(--glass-fill); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-line); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            border-radius: 14px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); pointer-events: auto; 
        }
        .glass-card.collapsed { width: 44px !important; height: 44px !important; border-radius: 50% !important; padding: 0 !important; overflow: hidden; min-height: 44px !important; }
        .glass-card.collapsed .content-box { display: none; }
        .dot-trigger { position: absolute; top: 0; right: 0; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--neon-accent); z-index: 600; transition: 0.2s; }
        .dot-trigger:hover { transform: scale(1.1); text-shadow: 0 0 10px var(--neon-accent); }

        /* Branding Nav */
        #nav-card { top: 15px; left: 15px; width: fit-content; padding: 12px; padding-right: 48px; }
        .logo-box { font-weight: 900; font-size: 15px; letter-spacing: -0.5px; display: flex; align-items: baseline; } 
        .logo-box span { color: var(--neon-accent); }
        .version-badge { font-size: 9px; color: #64748b; font-weight: 800; margin-left: 6px; }
        .slogan-box { font-size: 9px; color: #64748b; font-weight: 700; white-space: nowrap; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Toolbar */
        .tool-bar { display: flex; gap: 8px; margin-top: 10px; }
        .tool-btn { background: rgba(128,128,128,0.1); border: 1px solid var(--border-line); color: inherit; padding: 8px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; min-width: 36px; transition: 0.2s; position: relative; }
        .tool-btn:hover { background: rgba(128,128,128,0.25); }
        .tool-btn.active { background: var(--neon-accent); color: black; border-color: white; box-shadow: 0 0 15px var(--neon-accent); }
        body.light-theme .tool-btn.active { background: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 0 15px #0f172a; }

        /* Tooltips */
        .has-tooltip::after { content: attr(data-tooltip); position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; white-space: nowrap; opacity: 0; pointer-events: none; transition: 0.2s; border: 1px solid rgba(255,255,255,0.2); z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .has-tooltip:hover::after { opacity: 1; }
        .leg-sq.has-tooltip::after { right: 35px; top: 50%; left: auto; transform: translateY(-50%); } 

        /* Legend Blade */
        #legend-blade { top: 15px; right: 15px; width: 44px; height: auto; min-height: 44px; border-radius: 22px; padding: 0; display: flex; flex-direction: column; align-items: center; overflow: visible; }
        #legend-blade.expanded { width: 220px; border-radius: 14px; align-items: flex-start; padding: 12px; padding-right: 48px; }
        #legend-blade.collapsed { border-radius: 50% !important; height: 44px !important; }
        #leg-items { margin-top: 50px; display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; padding-bottom: 20px; }
        #legend-blade.expanded #leg-items { align-items: flex-start; margin-top: 40px; padding-bottom: 0; }

        .leg-sq { width: 22px; height: 22px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; position: relative; flex-shrink: 0; display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .leg-sq span { display: none; font-size: 11px; font-weight: 800; color: white; white-space: nowrap; margin-left: 10px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        #legend-blade.expanded .leg-sq { width: 100%; background: transparent !important; border: none; overflow: visible; }
        #legend-blade.expanded .leg-sq span { display: block; }
        #legend-blade.expanded .leg-sq::before { content: ''; width: 20px; height: 20px; border-radius: 4px; background: inherit; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); transition: 0.2s; }
        
        .leg-sq:hover { transform: scale(1.15); border-color: white; }
        #legend-blade.expanded .leg-sq:hover::before { border-color: white; transform: scale(1.1); }
        .leg-sq.active { border-color: white; box-shadow: 0 0 15px var(--neon-accent); transform: scale(1.1); }
        #legend-blade.expanded .leg-sq.active::before { border-color: white; box-shadow: 0 0 15px var(--neon-accent); transform: scale(1.1); }
        #legend-blade.expanded .leg-sq::after { display: none; } 

        #member-list { margin-top: 15px; width: 100%; max-height: 300px; overflow-y: auto; display: none; border-top: 1px solid var(--border-line); padding-top: 10px; scrollbar-width: none; }
        #legend-blade.expanded #member-list { display: block; }
        .member-row { padding: 8px 10px; font-size: 12px; cursor: pointer; border-radius: 6px; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        .member-row:hover { background: rgba(56, 189, 248, 0.2); color: var(--neon-accent); }

        /* Event Strip */
        #event-strip { bottom: 15px; left: 15px; right: 15px; height: 44px; border-radius: 22px; display: flex; align-items: center; justify-content: center; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #event-strip.collapsed { left: auto; width: 44px; right: 15px; }
        #event-strip .content-box { white-space: nowrap; overflow: hidden; padding: 0 40px; }
        .unread-flash { border-color: var(--neon-accent) !important; background: rgba(56, 189, 248, 0.25) !important; animation: glow-pulse 1.5s infinite alternate; }
        @keyframes glow-pulse { 0% { box-shadow: 0 0 5px var(--neon-accent); } 100% { box-shadow: 0 0 25px var(--neon-accent); } }

        /* Chat Panel */
        #chat-side { position: fixed; top: 0; right: -420px; width: 400px; height: 100%; background: rgba(10, 14, 20, 0.2); backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px); border-left: 1px solid var(--border-line); z-index: 1000; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; }
        #chat-side.open { transform: translateX(-420px); }
        #chat-scroller { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; scrollbar-width: none; }
        .bubble { padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.5; background: rgba(255,255,255,0.06); max-width: 85%; margin-bottom: 12px; border: 1px solid var(--border-line); }
        .bubble.me { background: #238636; align-self: flex-end; color: white; border-bottom-right-radius: 4px; }
        .bubble.them { align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Avatars */
        .node-avatar { display: none; pointer-events: none; }
        .avatar-mode .node-avatar { display: block; pointer-events: auto; cursor: pointer; }
        .avatar-mode .node-circle { display: none; }
        .avatar-mode .me-node .node-circle { display: block; }
        .avatar-mode .me-node .node-avatar { display: none; }
    </style>
</head>
<body class="dark-theme">

    <div id="nav-card" class="glass-ui glass-card">
        <div class="dot-trigger has-tooltip" data-tooltip="Minimize Nav" onclick="window.App.ui.collapse('#nav-card')">⦿</div>
        <div class="content-box">
            <div class="logo-box">surrounding<span>.io</span> <span class="version-badge">v14.4</span></div>
            <div class="slogan-box">MUTUAL CONNECTIONS DISCOVERY BY DMS</div>
            <div class="tool-bar">
                <button id="xray-btn" class="tool-btn has-tooltip" data-tooltip="X-Ray Discovery Mode" onclick="window.App.ui.xray()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></button>
                <button id="av-btn" class="tool-btn has-tooltip" data-tooltip="Toggle Avatars" onclick="window.App.ui.avatars()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
                <button id="grav-btn" class="tool-btn has-tooltip" data-tooltip="Toggle Gravity Mode" onclick="window.App.ui.gravity()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M6 9a6 6 0 1 0 12 0v-4h-4v4a2 2 0 1 1-4 0v-4H6v4z"/>
                        <path d="M7 3v2M6 4h2M17 4h2"/>
                    </svg>
                </button>
                <button id="node-btn" class="tool-btn has-tooltip" data-tooltip="Toggle Density (68/168)" onclick="window.App.ui.density()"><b id="node-label" style="font-size:11px;">68</b></button>
                <button id="theme-btn" class="tool-btn has-tooltip" data-tooltip="Light/Dark Theme" onclick="window.App.ui.theme()">
                    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="legend-blade" class="glass-ui glass-card">
        <div class="dot-trigger has-tooltip" data-tooltip="Minimize Legend Filters" onclick="window.App.ui.collapse('#legend-blade')">⦿</div>
        <div class="content-box">
            <div id="leg-items"></div>
            <div id="member-list"></div>
        </div>
    </div>

    <div id="event-strip" class="glass-ui glass-card">
        <div class="dot-trigger has-tooltip" data-tooltip="Acknowledge System Log" onclick="window.App.ui.readEvent()">⦿</div>
        <div class="content-box"><b id="event-text" style="font-weight:900; font-size:11px; color:var(--neon-accent); text-transform:uppercase; letter-spacing:1px;">Core Systems Online</b></div>
    </div>

    <div id="chat-side">
        <div style="padding:30px; border-bottom:1px solid var(--border-line); position:relative;">
            <h2 id="chat-display-name" style="margin:0; font-size:22px;">Name</h2>
            <p id="chat-meta-info" style="color:var(--neon-accent); font-size:10px; font-weight:800; margin-top:6px; text-transform:uppercase;">Intelligent Neural Link</p>
            <span style="position:absolute; top:30px; right:30px; cursor:pointer; font-size:24px; color:var(--neon-accent);" onclick="window.App.ui.closeChat()" title="Close Chat">✕</span>
        </div>
        <div id="chat-scroller"></div>
        <div style="padding:20px; display:flex; gap:10px; background:rgba(0,0,0,0.2); border-top:1px solid var(--border-line);">
            <input type="text" id="msg-input" placeholder="Type message..." autocomplete="off" style="flex:1; background:rgba(0,0,0,0.3); border:1px solid var(--border-line); color:inherit; padding:12px; border-radius:8px; outline:none;" title="Press Enter to send">
            <button class="tool-btn active" onclick="window.App.ui.sendMsg()" style="padding:0 24px; font-weight:900; border-radius:8px;" title="Send Message">SEND</button>
        </div>
    </div>

    <canvas id="edges"></canvas>
    <svg id="viz"><defs></defs></svg>

<script>
/**
 * surrounding.io | Ironclad Master v14.4
 */

window.App = {
    Config: {
        limit: parseInt(new URLSearchParams(window.location.search).get('n')) || 68,
        xray: false, avatars: false, light: false, gravity: false,
        activeNode: null, activeFilter: null, zoomT: null,
        groups: [], nodes: [], links: []
    },

    Narratives: {
        "Work": ["Did you see the Q3 reorg email?", "Sarah resigned, taking the leads with her.", "The D3 logic is finally stable.", "CEO wants a demo of the spatial map."],
        "Family": ["Aunt May's pie is officially toxic.", "Mark's mansion moat is leaking.", "Thanksgiving is in Tahoe this year.", "Mom found the old albums."],
        "Church": ["Pastor's Vegas secret is out.", "Bake sale hit the 10k target.", "Youth group needs a new leader.", "Audit starts on Friday."],
        "Investors": ["Burn rate is $180k. We have 14 months.", "Series A term sheet is signed. 25M post-money.", "Lead VC wants observer rights.", "User retention is up 40%."],
        "DevTeam": ["Elasticity target set to 0.1.", "React flow vs D3?", "Websocket latency is high.", "Merge the hotfix."],
        "Singles": ["MRI results are clear. Fast for 20h.", "Legal discovery phase begins Monday.", "Tax returns are finalized.", "The broker called about the property."]
    },

    ui: {
        collapse: (sel) => d3.select(sel).classed("collapsed", !d3.select(sel).classed("collapsed")),
        readEvent: () => { window.App.ui.collapse('#event-strip'); d3.select('#event-strip').classed("unread-flash", false); },
        theme: () => {
            App.Config.light = !App.Config.light;
            document.body.classList.toggle("light-theme", App.Config.light);
            d3.select("#theme-btn").classed("active", App.Config.light);
            const sunIcon = `<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>`;
            const moonIcon = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
            document.getElementById("theme-icon").innerHTML = App.Config.light ? sunIcon : moonIcon;
            if(window.App.Engine) window.App.Engine.alpha(0.1).restart();
        },
        xray: () => { 
            App.Config.xray = !App.Config.xray; 
            d3.select("#xray-btn").classed("active", App.Config.xray); 
            if(window.App.Engine) window.App.Engine.alpha(0.1).restart();
        },
        avatars: () => { 
            App.Config.avatars = !App.Config.avatars; 
            d3.select("#viz").classed("avatar-mode", App.Config.avatars); 
            d3.select("#av-btn").classed("active", App.Config.avatars); 
        },
        gravity: () => {
            App.Config.gravity = !App.Config.gravity;
            d3.select("#grav-btn").classed("active", App.Config.gravity);
            
            const isDense = App.Config.limit > 100;
            // High friction ensures perfect rapid settling for dense 168 maps
            App.Engine.velocityDecay(App.Config.gravity ? 0.45 : (isDense ? 0.35 : 0.18));
            App.Engine.force("charge").strength(App.Config.gravity ? -10 : (isDense ? -30 : -60));
            
            App.Engine.force("link").distance(l => {
                if(l.type === 'direct') {
                    if (App.Config.gravity) return Math.max(18, 140 - (l.target.weight * 130));
                    return l.target.group === 'singles' ? 15 : 80 - (l.target.weight * 60);
                }
                return App.Config.gravity ? 5 : 12;
            }).strength(App.Config.gravity ? 0.3 : 1);

            App.Engine.force("x", d3.forceX(n => {
                if (n.isMe || n.group === 'singles') return window.innerWidth/2;
                const r = App.Config.gravity ? Math.max(20, (1.5 - n.weight) * 60) : 260;
                const gConf = App.Config.groups.find(g => g.id === n.group);
                return window.innerWidth/2 + Math.cos(gConf ? gConf.angle : 0) * r;
            }).strength(n => n.group === 'singles' ? (App.Config.gravity ? 1.0 : 4.0) : (App.Config.gravity ? 0.8 : 0.6)));
            
            App.Engine.force("y", d3.forceY(n => {
                if (n.isMe) return window.innerHeight/2.3;
                if (n.group === 'singles') {
                    const drop = App.Config.gravity ? 15 + (1 - n.weight)*30 : 20 + (n.weight * 25);
                    return window.innerHeight/2.3 + drop;
                }
                const r = App.Config.gravity ? Math.max(20, (1.5 - n.weight) * 60) : 260;
                const gConf = App.Config.groups.find(g => g.id === n.group);
                return window.innerHeight/2.3 + Math.sin(gConf ? gConf.angle : 0) * r;
            }).strength(n => n.group === 'singles' ? (App.Config.gravity ? 1.0 : 3.0) : (App.Config.gravity ? 0.8 : 0.6)));

            App.Engine.alpha(0.3).restart();
        },
        density: () => { 
            App.Config.limit = (App.Config.limit === 68 ? 168 : 68); 
            document.getElementById("node-label").innerText = App.Config.limit;
            d3.select("#viz").html("<defs></defs>");
            if (App.Engine) App.Engine.stop();
            if (App.mergeTimer) clearTimeout(App.mergeTimer);
            
            App.Config.activeNode = null;
            App.Config.activeFilter = null;
            App.ui.closeChat();
            d3.select("#legend-blade").classed("expanded", false);
            d3.select("#leg-items").html("");
            d3.select("#member-list").html("");
            
            const ctx = document.getElementById("edges").getContext("2d");
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

            App.init();
        },
        closeChat: () => { 
            App.Config.activeNode = null; 
            d3.select("#chat-side").classed("open", false); 
            if(window.App.Engine) window.App.Engine.alpha(0.1).restart();
        },
        sendMsg: () => {
            const inp = document.getElementById("msg-input"); if(!inp.value) return;
            App.Config.activeNode.history.push({from:'me', text: inp.value});
            
            const flow = d3.select("#chat-scroller").html("");
            App.Config.activeNode.history.forEach(h => flow.append("div").attr("class", `bubble ${h.from}`).text(h.text));
            inp.value = ""; flow.node().scrollTop = flow.node().scrollHeight;

            const targetNode = App.Config.activeNode;
            setTimeout(() => {
                const typeStr = targetNode.group === 'singles' ? 'Singles' : ["Work", "Family", "Church", "Investors", "DevTeam"][targetNode.group] || "Work";
                const pool = App.Narratives[typeStr] || App.Narratives["Work"];
                const aiReply = pool[Math.floor(Math.random() * pool.length)];
                
                targetNode.history.push({from:'them', text: aiReply});
                flow.append("div").attr("class", `bubble them`).text(aiReply);
                flow.node().scrollTop = flow.node().scrollHeight;
            }, 800 + Math.random() * 1200);
        },
        openChat: (n) => {
            App.Config.activeNode = n;
            d3.select("#chat-display-name").text(n.name);
            const mCount = App.Config.links.filter(l => l.type === 'mutual' && (l.source.id === n.id || l.target.id === n.id)).length;
            const gName = n.group === 'singles' ? 'Singles' : App.Config.groups.find(g => g.id === n.group)?.name;
            d3.select("#chat-meta-info").text(`${mCount} Mutual Connections • ${gName}`);
            
            const flow = d3.select("#chat-scroller").html("");
            n.history.forEach(h => flow.append("div").attr("class", `bubble ${h.from}`).text(h.text));
            d3.select("#chat-side").classed("open", true);
            
            if(window.App.Zoom) d3.select("#viz").transition().duration(800).call(window.App.Zoom.transform, d3.zoomIdentity.translate(window.innerWidth/2 - 100, window.innerHeight/2).scale(2.2).translate(-n.x, -n.y));
            if(window.App.Engine) window.App.Engine.alpha(0.1).restart();
        },
        refreshLegend: () => {
            const legBox = d3.select("#leg-items").html("");
            App.Config.groups.forEach(g => { if(g.name) {
                const grpNodes = App.Config.nodes.filter(n => n.group === g.id);
                g.name = `Circle#size:${grpNodes.length}`;
                
                const sq = legBox.append("div")
                    .attr("class", `leg-sq has-tooltip ${App.Config.activeFilter === g.id ? 'active' : ''}`)
                    .style("background", g.color)
                    .attr("data-tooltip", g.name)
                    .on("click", () => {
                        const isClosing = App.Config.activeFilter === g.id;
                        App.Config.activeFilter = isClosing ? null : g.id;
                        d3.select("#legend-blade").classed("expanded", !isClosing);
                        
                        if (!isClosing) {
                            const currentGrpNodes = App.Config.nodes.filter(n => n.group === g.id);
                            App.ui.renderDir(currentGrpNodes);
                        }
                        
                        App.ui.refreshLegend(); App.Engine.alpha(0.1).restart();
                    });
                sq.append("span").text(g.name);
            }});
            
            const singles = App.Config.nodes.filter(n => n.group === 'singles');
            const singSq = legBox.append("div")
                .attr("class", `leg-sq has-tooltip ${App.Config.activeFilter === 'singles' ? 'active' : ''}`)
                .style("background", "var(--red-singles)")
                .attr("data-tooltip", `Singles#size:${singles.length}`)
                .on("click", () => {
                    const isClosing = App.Config.activeFilter === 'singles';
                    App.Config.activeFilter = isClosing ? null : 'singles';
                    d3.select("#legend-blade").classed("expanded", !isClosing);
                    if (!isClosing) App.ui.renderDir(App.Config.nodes.filter(n => n.group === 'singles'));
                    App.ui.refreshLegend(); App.Engine.alpha(0.1).restart();
                });
            singSq.append("span").text(`Singles#size:${singles.length}`);
        },
        renderDir: (arr) => {
            const list = d3.select("#member-list").html("");
            arr.forEach(m => list.append("div").attr("class", "member-row").text(m.name).on("click", () => App.ui.openChat(m)));
        }
    },

    init: () => {
        const w = window.innerWidth, h = window.innerHeight;
        const canvas = document.getElementById("edges"), ctx = canvas.getContext("2d");
        const svg = d3.select("#viz"), gLayer = svg.append("g");
        
        canvas.width = w; canvas.height = h;

        App.Config.groups = [
            { id: 0, color: '#94a3b8', angle: -Math.PI * 0.85, name: "Circle" },
            { id: 1, color: '#a855f7', angle: -Math.PI * 0.65, name: "Circle" },
            { id: 2, color: '#22c55e', angle: -Math.PI * 0.45, name: "Circle" },
            { id: 3, color: '#eab308', angle: -Math.PI * 0.25, name: "Circle" },
            { id: 4, color: '#f97316', angle: -Math.PI * 0.05, name: "Circle" }
        ];

        App.Config.nodes = [{ id: 0, name: "Me", isMe: true, weight: 1, x: w/2, y: h/2.3, fx: w/2, fy: h/2.3 }];
        App.Config.links = [];

        const isSingleIndex = (idx) => idx > App.Config.limit - 10;
        const isDense = App.Config.limit > 100;

        for(let i=1; i <= App.Config.limit; i++) {
            const wt = Math.pow(Math.random(), 1.2);
            const gender = i % 2 === 0 ? 'men' : 'women';
            const faceId = Math.floor(i / 2) % 100;
            const isSingle = isSingleIndex(i);
            
            App.Config.nodes.push({ 
                id: i, group: isSingle ? 'singles' : (i % 5), weight: wt, isLoner: isSingle,
                name: isSingle ? ["Lawyer", "CPA", "MD", "Agent", "Mentor"][i%5] + "_" + i : `Contact_${i}`, 
                avatar: `https://randomuser.me/api/portraits/${gender}/${faceId}.jpg`,
                history: []
            });
        }

        App.Config.nodes.slice(1).forEach(n => App.Config.links.push({ source: App.Config.nodes[0], target: n, type: 'direct', weight: n.weight }));
        
        App.Config.groups.forEach(gConf => {
            const mems = App.Config.nodes.filter(n => n.group === gConf.id);
            if(mems.length > 1) {
                for(let i=1; i < mems.length; i++) App.Config.links.push({ source: mems[i], target: mems[i-1], type: 'mutual' });
                mems.forEach((n, i) => mems.slice(i+2).forEach(t => {
                    if(Math.random() > 0.65) App.Config.links.push({ source: n, target: t, type: 'mutual' });
                }));
            }
        });

        App.Config.nodes.forEach(n => {
            if(n.isMe) return;
            n.color = n.group === 'singles' ? "var(--red-singles)" : App.Config.groups[n.group].color;

            const typeStr = n.group === 'singles' ? 'Singles' : ["Work", "Family", "Church", "Investors", "DevTeam"][n.group];
            const pool = App.Narratives[typeStr] || App.Narratives["Work"];
            for(let j=0; j < Math.floor(n.weight * 6) + 3; j++) {
                n.history.push({ from: j%2===0?'them':'me', text: j===0 ? pool[(n.id * 7 + j) % pool.length] : pool[(n.id * 3 + j) % pool.length] });
            }
        });

        App.Engine = d3.forceSimulation(App.Config.nodes)
            .force("link", d3.forceLink(App.Config.links).distance(l => {
                if(l.type === 'direct') return l.target.group === 'singles' ? 15 : 80 - (l.target.weight * 60);
                return 12;
            }).strength(1))
            // Dense 168 mode automatically drops charge to prevent endless bouncing
            .force("charge", d3.forceManyBody().strength(isDense ? -30 : -60))
            // Reverted global collision radius back to 20 so nodes TOUCH the center naturally again
            .force("collide", d3.forceCollide().radius(d => d.isMe ? 20 : 18).iterations(3))
            .force("x", d3.forceX(d => {
                if (d.isMe || d.group === 'singles') return w/2;
                const gConf = App.Config.groups.find(g => g.id === d.group);
                return w/2 + Math.cos(gConf ? gConf.angle : 0) * 260;
            }).strength(d => d.group === 'singles' ? 4.0 : 0.6))
            .force("y", d3.forceY(d => {
                if (d.isMe) return h/2.3;
                if (d.group === 'singles') return h/2.3 + 20 + (d.weight * 25);
                const gConf = App.Config.groups.find(g => g.id === d.group);
                return h/2.3 + Math.sin(gConf ? gConf.angle : 0) * 260;
            }).strength(d => d.group === 'singles' ? 3.0 : 0.6))
            .velocityDecay(isDense ? 0.35 : 0.18).alphaTarget(0.1).on("tick", () => {
                
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2.3;
                
                // FORCEFIELD: Prevent nodes from overlapping the center mathematically without breaking global gravity touches
                App.Config.nodes.forEach(d => {
                    if (!d.isMe) {
                        const dx = d.x - cx;
                        const dy = d.y - cy;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        const minR = 12 + (6 + d.weight * 10) + 1; // Center radius (12) + Node Radius + 1px barrier gap
                        
                        // Push out exactly to the touch line if they cross it
                        if (dist < minR && dist > 0) {
                            const force = (minR - dist) / dist;
                            d.x += dx * force * 0.8;
                            d.y += dy * force * 0.8;
                        }
                        
                        // Singles clamping strictly blocks them from floating North of the White dot
                        if (d.group === 'singles' && d.y < cy + minR) {
                            d.y = cy + minR;
                            if (d.vy < 0) d.vy = 0; 
                        }
                    }
                });

                nodeEls.attr("transform", d => `translate(${d.x},${d.y})`)
                     .attr("fill", d => {
                         if (d.isMe) return "#fff";
                         const cHex = d.color === "var(--red-singles)" ? "#f43f5e" : d.color;
                         return d3.color(cHex).darker(d.weight * 0.4); 
                     })
                     .style("opacity", d => {
                        const bA = d.isMe ? 1 : (0.15 + d.weight * 0.85);
                        
                        // 25% True Dim for Singles, exact 50% decay for Avatars
                        const dimA = d.group === 'singles' ? 0.25 : (bA * 0.5);
                        
                        if (App.Config.activeFilter !== null) {
                            return (d.group === App.Config.activeFilter || d.isMe || (App.Config.activeFilter === 'singles' && d.isLoner)) ? bA : dimA;
                        }
                        if (!App.Config.xray && !App.Config.activeNode) return bA;
                        if (d.isMe || d === App.Config.activeNode) return 1;
                        
                        const isPath = App.Config.links.some(l => l.type === 'mutual' && ((l.source.id === App.Config.activeNode?.id && l.target.id === d.id) || (l.target.id === App.Config.activeNode?.id && l.source.id === d.id)));
                        return isPath ? 1 : dimA;
                     });
                draw(App.Config.zoomT || d3.zoomIdentity);
            });

        App.Zoom = d3.zoom().scaleExtent([0.1, 10]).on("zoom", (e) => {
            gLayer.attr("transform", e.transform);
            App.Config.zoomT = e.transform;
            draw(e.transform);
        });
        svg.call(App.Zoom).call(App.Zoom.transform, d3.zoomIdentity.translate(w/2, h/2).scale(1.45).translate(-w/2, -h/2));

        const nodeEls = gLayer.append("g").selectAll("g").data(App.Config.nodes).join("g")
            .attr("class", d => d.isMe ? "me-node" : "standard-node")
            .style("cursor", "pointer").on("click", (e, d) => { if(!d.isMe) App.ui.openChat(d); });

        nodeEls.append("circle").attr("class", "node-circle").attr("r", d => d.isMe ? 12 : 6 + (d.weight * 10)).attr("stroke", "rgba(0,0,0,0.5)");

        const defs = svg.select("defs");
        App.Config.nodes.forEach(d => {
            if(d.isMe) return;
            defs.append("pattern").attr("id", `p-${d.id}`).attr("width", 1).attr("height", 1).append("image").attr("href", d.avatar).attr("width", 40).attr("height", 40).attr("preserveAspectRatio", "xMidYMid slice");
        });
        nodeEls.filter(d => !d.isMe).append("circle").attr("class", "node-avatar").attr("r", d => 6 + (d.weight * 10)).attr("fill", d => `url(#p-${d.id})`);

        function draw(t) {
            ctx.clearRect(0, 0, w, h); ctx.save(); ctx.translate(t.x, t.y); ctx.scale(t.k, t.k);
            App.Config.links.forEach(l => {
                const isH = App.Config.activeNode && (l.source.id === App.Config.activeNode.id || l.target.id === App.Config.activeNode.id);
                const isMut = l.type === 'mutual';
                const bCol = l.target.color === "var(--red-singles)" ? "#f43f5e" : (l.target.color || "#fff");
                
                ctx.beginPath();
                ctx.lineWidth = isH ? 5 : (l.type === 'direct' ? 0.5 + l.target.weight * 4 : 1.2);
                
                // Advanced Opacity & Blur State Machine for Cyberpunk Light Mode
                let blurVal = 0;
                let alphaVal = 0.4;
                let strokeCol = bCol;
                
                if (App.Config.activeNode || App.Config.xray) {
                    if (isH) { 
                        strokeCol = App.Config.light ? "#444" : "#fff"; 
                        alphaVal = 1; 
                        blurVal = App.Config.light ? 5 : 10; 
                        ctx.shadowColor = strokeCol;
                    } else if (isMut && !App.Config.activeNode) { 
                        alphaVal = 0.95; 
                        blurVal = 25; // Massive Cyberpunk Glow regardless of Theme
                        ctx.shadowColor = bCol; 
                    } else { 
                        alphaVal = l.target.group === 'singles' ? 0.25 : 0.05; 
                    }
                } else if (App.Config.activeFilter !== null) {
                    const inGrp = (App.Config.activeFilter === 'singles' && l.target.isLoner) || (l.target.group === App.Config.activeFilter);
                    if (inGrp) {
                        alphaVal = isMut ? 0.7 : 0.4;
                        blurVal = isMut ? 25 : 0; // Glowing targeted Mutual Web
                        ctx.shadowColor = bCol;
                    } else {
                        alphaVal = l.target.group === 'singles' ? 0.25 : 0.02; 
                    }
                } else {
                    alphaVal = isMut ? 0.35 : 0.4;
                    blurVal = isMut ? 20 : 0; // Ambient Mutual Glow
                    ctx.shadowColor = bCol;
                }

                ctx.strokeStyle = strokeCol;
                ctx.globalAlpha = alphaVal;
                ctx.shadowBlur = blurVal;
                
                ctx.moveTo(l.source.x, l.source.y); ctx.lineTo(l.target.x, l.target.y); ctx.stroke();
            });
            ctx.restore();
        }

        App.mergeTimer = setTimeout(() => {
            d3.select("#event-strip").classed("unread-flash", true);
            d3.select("#event-text").text("BRIDGE EVENT: YELLOW + GREEN → BLUE MERGE");
            
            const g2 = App.Config.groups.find(g => g.id === 2);
            const g3 = App.Config.groups.find(g => g.id === 3);
            if(!g2 || !g3) return;

            const n2 = App.Config.nodes.find(n => n.group === 2);
            const n3 = App.Config.nodes.find(n => n.group === 3);
            if(n2 && n3) {
                App.Config.links.push({ source: n2, target: n3, type: 'mutual' });
                App.Engine.force("link").links(App.Config.links);
            }
            
            // STRUCTURAL MERGE BUG FIX: Instant Data Relocation cleanly breaks closure staleness
            App.Config.nodes.forEach(n => {
                if (n.group === 2 || n.group === 3) {
                    n._startColor = n.color; // Cached for visual animation loop
                    if (n.group === 3) n.group = 2; // Hard mathematical wipe of Group 3
                }
            });
            
            // Exterminate Group 3 completely from the legend model
            App.Config.groups = App.Config.groups.filter(g => g.id !== 3);
            
            // Seamless Handover if watching Group 3
            if (App.Config.activeFilter === 3) App.Config.activeFilter = 2;
            
            // Re-render legend instantaneously (Group 3 disappears cleanly)
            App.ui.refreshLegend();
            
            if (App.Config.activeFilter === 2) {
                d3.select("#legend-blade").classed("expanded", true);
                App.ui.renderDir(App.Config.nodes.filter(n => n.group === 2));
            }

            // VISUAL ANIMATION TWEEN
            const startG2Color = g2.color;
            const targetColor = "#38bdf8"; // Neon Blue Merge Destination
            g2.angle = (g2.angle + g3.angle) / 2;

            d3.timer((elapsed) => {
                const tFact = Math.min(1, elapsed / 2500);
                
                App.Config.nodes.forEach(n => {
                    if (n.group === 2 && n._startColor) {
                        n.color = d3.interpolateRgb(n._startColor, targetColor)(tFact);
                    }
                });
                
                g2.color = d3.interpolateRgb(startG2Color, targetColor)(tFact);
                
                if(tFact === 1) { 
                    App.Config.nodes.forEach(n => delete n._startColor);
                    App.ui.refreshLegend(); 
                    return true; 
                }
            });
            
            App.Engine.alpha(1).restart();
        }, 10000);

        nodeEls.filter(d => d.isMe).call(d3.drag()
            .on("start", (e, d) => { App.Engine.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
            .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
            .on("end", function(e, d) {
                App.Engine.alphaTarget(0.05);
                d3.select(this).transition().duration(600).ease(d3.easeBackOut.overshoot(1.2))
                    .tween("snapBack", () => {
                        const ix = d3.interpolate(d.fx, window.innerWidth / 2);
                        const iy = d3.interpolate(d.fy, window.innerHeight / 2.3);
                        return function(t) { d.fx = ix(t); d.fy = iy(t); };
                    });
            }));

        App.ui.refreshLegend(); 
    }
};

document.getElementById("msg-input").addEventListener("keypress", e => { if(e.key==='Enter') App.ui.sendMsg(); });
d3.select("#viz").on("click", (e) => { if(e.target.tagName === 'svg') App.ui.closeChat(); });

const bootCheck = setInterval(() => { if (window.d3 && document.getElementById("edges")) { clearInterval(bootCheck); App.init(); }}, 100);
</script>
</body>
</html>
